<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sizebay — Demo TryOn</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f0f0f0;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      nav {
        padding: 16px 24px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo img {
        height: 26px;
        display: block;
      }
      .nav-tag {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #999;
      }

      .container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }

      .card {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        padding: 40px 36px;
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-size: 11px;
        font-weight: 500;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      input[type="text"] {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #fafafa;
        transition: border-color 0.2s, background 0.2s;
        outline: none;
      }
      input[type="text"]:focus {
        border-color: #1a1a1a;
        background: #fff;
      }

      .img-preview {
        width: 100%;
        max-height: 160px;
        object-fit: cover;
        border-radius: 6px;
        margin-top: 4px;
        display: none;
        border: 1px solid #e0e0e0;
      }

      .btn-gerar {
        width: 100%;
        padding: 14px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        margin-top: 4px;
      }
      .btn-gerar:hover {
        background: #333;
      }
      .btn-gerar:active {
        transform: scale(0.98);
      }

      .btn-limpar {
        width: 100%;
        padding: 10px;
        background: transparent;
        color: #999;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-limpar:hover {
        border-color: #aaa;
        color: #555;
      }

      @media (max-width: 480px) {
        .card {
          padding: 28px 20px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="#" class="logo">
        <img
          src="https://sizebay.com/wp-content/uploads/2025/10/logo-sizebay-atualizado.svg"
          alt="Sizebay"
        />
      </a>
      <span class="nav-tag">Demo — TryOn</span>
    </nav>

    <div class="container">
      <div class="card">
        <div class="field">
          <label>Nome do Produto</label>
          <input
            type="text"
            id="inp-nome"
            placeholder="Ex: Trench Coat Milano"
          />
        </div>
        <div class="field">
          <label>Link da Imagem</label>
          <input
            type="text"
            id="inp-imagem"
            placeholder="https://..."
            oninput="previewLink()"
          />
          <img id="img-preview" class="img-preview" alt="Preview" />
        </div>
        <button class="btn-gerar" onclick="gerar()">Gerar Página →</button>
        <button class="btn-limpar" onclick="limpar()">Limpar tudo</button>
      </div>
    </div>

    <script>
      function previewLink() {
        const url = document.getElementById("inp-imagem").value.trim();
        const prev = document.getElementById("img-preview");
        if (url) {
          prev.src = url;
          prev.style.display = "block";
          prev.onerror = () => {
            prev.style.display = "none";
          };
        } else {
          prev.style.display = "none";
        }
      }

      function gerar() {
        const nome = document.getElementById("inp-nome").value.trim();
        const img = document.getElementById("inp-imagem").value.trim();

        if (!nome && !img) {
          alert("Preencha pelo menos um campo antes de gerar.");
          return;
        }

        // Monta URL com query params
        const params = new URLSearchParams();
        if (nome) params.set("nome", nome);
        if (img) params.set("img", img);

        window.location.href = "produto.html?" + params.toString();
      }

      function limpar() {
        document.getElementById("inp-nome").value = "";
        document.getElementById("inp-imagem").value = "";
        const prev = document.getElementById("img-preview");
        prev.src = "";
        prev.style.display = "none";
      }
    </script>
  </body>
</html>
