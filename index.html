<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sizebay — Demo TryOn</title>
    <link rel="canonical" href="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f0f0f0;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      nav {
        padding: 16px 24px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo img {
        height: 26px;
        display: block;
      }
      .nav-tag {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #999;
      }

      /* ── FORM VIEW ── */
      #view-form {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
      }

      .card {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        padding: 40px 36px;
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      label {
        font-size: 11px;
        font-weight: 500;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #fafafa;
        transition: border-color 0.2s, background 0.2s;
        outline: none;
      }
      input[type="text"]:focus,
      textarea:focus {
        border-color: #1a1a1a;
        background: #fff;
      }
      textarea {
        resize: vertical;
        min-height: 100px;
        line-height: 1.6;
      }

      .img-preview {
        width: 100%;
        max-height: 160px;
        object-fit: cover;
        border-radius: 6px;
        margin-top: 4px;
        display: none;
        border: 1px solid #e0e0e0;
      }

      .btn-gerar {
        width: 100%;
        padding: 14px;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        margin-top: 4px;
      }
      .btn-gerar:hover {
        background: #333;
      }
      .btn-gerar:active {
        transform: scale(0.98);
      }

      .btn-limpar {
        width: 100%;
        padding: 10px;
        background: transparent;
        color: #999;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-limpar:hover {
        border-color: #aaa;
        color: #555;
      }

      /* ── PRODUCT VIEW ── */
      #view-product {
        display: none;
        flex: 1;
        flex-direction: column;
        background: #f5f5f5;
      }

      .product {
        max-width: 480px;
        margin: 0 auto;
        background: #fff;
        width: 100%;
        animation: fadeUp 0.4s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .product-image {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        background: #ececec;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .product-image .placeholder {
        font-size: 72px;
        color: #ccc;
      }

      .tag-categoria {
        position: absolute;
        bottom: 16px;
        left: 16px;
        background: #fff;
        color: #1a1a1a;
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 6px 12px;
        font-weight: 500;
      }

      .product-info {
        padding: 28px 24px 48px;
      }
      .product-title {
        font-size: 26px;
        font-weight: 400;
        line-height: 1.2;
        margin-bottom: 14px;
        letter-spacing: -0.3px;
      }
      .divider {
        width: 32px;
        height: 2px;
        background: #1a1a1a;
        margin-bottom: 16px;
      }
      .product-description {
        font-size: 14px;
        line-height: 1.75;
        color: #666;
        font-weight: 300;
      }

      .btn-outro {
        display: inline-block;
        margin-top: 32px;
        padding: 12px 20px;
        background: transparent;
        color: #1a1a1a;
        border: 1px solid #1a1a1a;
        border-radius: 6px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.2s, color 0.2s;
      }
      .btn-outro:hover {
        background: #1a1a1a;
        color: #fff;
      }

      /* nav do produto */
      #nav-product {
        display: none;
      }

      @media (min-width: 768px) {
        .product {
          max-width: 960px;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .product-image {
          aspect-ratio: auto;
          min-height: 580px;
        }
        .product-info {
          padding: 48px 44px;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .product-title {
          font-size: 32px;
        }
      }

      @media (max-width: 480px) {
        .card {
          padding: 28px 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV FORMULÁRIO -->
    <nav id="nav-form">
      <a href="#" class="logo">
        <img
          src="https://sizebay.com/wp-content/uploads/2025/10/logo-sizebay-atualizado.svg"
          alt="Sizebay"
        />
      </a>
      <span class="nav-tag">Demo — TryOn</span>
    </nav>

    <!-- NAV PRODUTO -->
    <nav id="nav-product">
      <img
        src="https://sizebay.com/wp-content/uploads/2025/10/logo-sizebay-atualizado.svg"
        alt="Sizebay"
      />
      <span class="nav-tag">Demo — TryOn</span>
    </nav>

    <!-- VIEW: FORMULÁRIO -->
    <div id="view-form">
      <div class="card">
        <div class="field">
          <label>Nome do Produto</label>
          <input
            type="text"
            id="inp-nome"
            placeholder="Ex: Trench Coat Milano"
          />
        </div>
        <div class="field">
          <label>Categoria</label>
          <input
            type="text"
            id="inp-categoria"
            placeholder="Ex: Casacos, Vestidos, Calças..."
          />
        </div>
        <div class="field">
          <label>Descrição</label>
          <textarea
            id="inp-descricao"
            placeholder="Descreva o produto, materiais, estilo, ocasião..."
          ></textarea>
        </div>
        <div class="field">
          <label>Link da Imagem</label>
          <input
            type="text"
            id="inp-imagem"
            placeholder="https://..."
            oninput="previewLink()"
          />
          <img id="img-preview" class="img-preview" alt="Preview" />
        </div>
        <button class="btn-gerar" onclick="gerar()">
          Gerar Página de Produto →
        </button>
        <button class="btn-limpar" onclick="limpar()">Limpar tudo</button>
      </div>
    </div>

    <!-- VIEW: PRODUTO -->
    <div id="view-product">
      <main class="product">
        <div class="product-image">
          <div class="placeholder" id="prod-placeholder">👗</div>
          <img id="prod-img" src="" alt="" style="display: none" />
          <span class="tag-categoria" id="prod-cat"></span>
        </div>
        <div class="product-info">
          <h1 class="product-title" id="prod-titulo"></h1>
          <div class="divider"></div>
          <p class="product-description" id="prod-desc"></p>
          <a class="btn-outro" onclick="abrirNovoFormulario()" href="#">
            Testar em outro produto ↗
          </a>
        </div>
      </main>
    </div>

    <script>
      function previewLink() {
        const url = document.getElementById("inp-imagem").value.trim();
        const prev = document.getElementById("img-preview");
        if (url) {
          prev.src = url;
          prev.style.display = "block";
          prev.onerror = () => {
            prev.style.display = "none";
          };
        } else {
          prev.style.display = "none";
        }
      }

      function gerar() {
        const nome = document.getElementById("inp-nome").value.trim();
        const cat = document.getElementById("inp-categoria").value.trim();
        const desc = document.getElementById("inp-descricao").value.trim();
        const img = document.getElementById("inp-imagem").value.trim();

        if (!nome && !cat && !desc && !img) {
          alert("Preencha pelo menos um campo antes de gerar.");
          return;
        }

        // Preenche a view do produto
        document.title = nome || "Produto";
        document.querySelector('link[rel="canonical"]').href =
          "https://32c6c6-a9.myshopify.com/products/" +
          encodeURIComponent(nome || "produto");

        document.getElementById("prod-titulo").textContent = nome;
        document.getElementById("prod-cat").textContent = cat;
        document.getElementById("prod-desc").textContent = desc;

        const prodImg = document.getElementById("prod-img");
        const prodPlaceholder = document.getElementById("prod-placeholder");

        if (img) {
          prodImg.src = img;
          prodImg.style.display = "block";
          prodPlaceholder.style.display = "none";
        } else {
          prodImg.style.display = "none";
          prodPlaceholder.style.display = "flex";
        }

        // Troca nav e views
        document.getElementById("nav-form").style.display = "none";
        document.getElementById("nav-product").style.display = "flex";
        document.getElementById("view-form").style.display = "none";
        document.getElementById("view-product").style.display = "flex";

        window.scrollTo({ top: 0, behavior: "smooth" });

        // Cookie
        document.cookie =
          "SIZEBAY_SESSION_ID_V4=0651FC19655De443cc7be89c4306ba6c1a20f4f05df2; path=/; SameSite=Lax";

        // Injeta script Sizebay apenas uma vez
        if (!document.getElementById("szb-tryon__implantation")) {
          const collectProductData = () => ({
            product_id: null,
            title: document.querySelector(".product-title").textContent,
            price: null,
            image_url: document.querySelector(".product-image img")?.src || "",
          });

          window.SizebayTryOn = () => ({
            getTenantId: () => 6273,
            getEnvironment: () => "production",
            getDefaultUnit: () => "cm",
            getSizeSystem: () => "EU",
            getAnchor: () => ".product-image",
            getModules: () => ["selfTryon"],
            getLang: "br",
            getSelfTryonPermalink: () =>
              "https://32c6c6-a9.myshopify.com/products/" +
              document
                .querySelector('link[rel="canonical"]')
                .href.split("/products/")
                .pop(),
            getProductData: collectProductData,
            getBaseVrfUrl: () =>
              "https://vfr-v3-production.sizebay.technology/",
            getSelfTryonBaseUrl: () =>
              "https://tryon-dev.internalsizebay.com/tryon/index.html",
            getSelfTryonBackendUrl: () =>
              "https://tryon-dev.internalsizebay.com/",
          });

          const script = document.createElement("script");
          script.id = "szb-tryon__implantation";
          script.src =
            "https://vfr-implantation.s3.us-east-1.amazonaws.com/new-implantation/szb-implantation.js";
          script.async = true;
          document.body.appendChild(script);
        }
      }

      function abrirNovoFormulario() {
        window.open(window.location.href, "_blank");
      }

      function limpar() {
        document.getElementById("inp-nome").value = "";
        document.getElementById("inp-categoria").value = "";
        document.getElementById("inp-descricao").value = "";
        document.getElementById("inp-imagem").value = "";
        const prev = document.getElementById("img-preview");
        prev.src = "";
        prev.style.display = "none";
      }
    </script>
  </body>
</html>
