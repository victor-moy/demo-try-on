<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produto</title>
    <link rel="canonical" href="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        min-height: 100vh;
      }
      nav {
        padding: 16px 24px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      nav img {
        height: 24px;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .btn-voltar {
        font-size: 12px;
        color: #999;
        text-decoration: none;
        font-family: "Inter", sans-serif;
        transition: color 0.2s;
      }
      .btn-voltar:hover {
        color: #1a1a1a;
      }
      .lang-toggle {
        display: flex;
        align-items: center;
        background: #f0f0f0;
        border-radius: 20px;
        padding: 3px;
        gap: 2px;
      }
      .lang-btn {
        padding: 4px 10px;
        border-radius: 16px;
        border: none;
        background: transparent;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: #999;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
      }
      .lang-btn.active {
        background: #1a1a1a;
        color: #fff;
      }
      .product {
        max-width: 480px;
        margin: 0 auto;
        background: #fff;
        animation: fadeUp 0.4s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .product-image {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        background: #ececec;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .product-image .placeholder {
        font-size: 72px;
        color: #ccc;
      }
      .product-info {
        padding: 28px 24px 48px;
      }
      .product-title {
        font-size: 26px;
        font-weight: 400;
        line-height: 1.2;
        margin-bottom: 14px;
        letter-spacing: -0.3px;
      }
      .divider {
        width: 32px;
        height: 2px;
        background: #1a1a1a;
        margin-bottom: 16px;
      }
      @media (min-width: 768px) {
        .product {
          max-width: 960px;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .product-image {
          aspect-ratio: auto;
          min-height: 580px;
        }
        .product-info {
          padding: 48px 44px;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .product-title {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <img
        src="https://sizebay.com/wp-content/uploads/2025/10/logo-sizebay-atualizado.svg"
        alt="Sizebay"
      />
      <div class="nav-right">
        <div class="lang-toggle">
          <button class="lang-btn" id="btn-pt" onclick="setLang('pt')">
            PT
          </button>
          <button class="lang-btn" id="btn-en" onclick="setLang('en')">
            EN
          </button>
        </div>
        <a class="btn-voltar" id="btn-voltar" href="index.html"
          >← Voltar ao formulário</a
        >
      </div>
    </nav>

    <main class="product">
      <div class="product-image">
        <div class="placeholder" id="prod-placeholder">👗</div>
        <img id="prod-img" src="" alt="" style="display: none" />
      </div>
      <div class="product-info">
        <h1 class="product-title" id="prod-titulo"></h1>
        <div class="divider"></div>
      </div>
    </main>

    <script>
      const i18n = {
        pt: {
          btn_voltar: "← Voltar",
          page_title: "Produto",
          lang_attr: "pt-BR",
          sizebay_lang: "br",
        },
        en: {
          btn_voltar: "← Back",
          page_title: "Product",
          lang_attr: "en",
          sizebay_lang: "en",
        },
      };

      const urlParams = new URLSearchParams(window.location.search);
      const nome = urlParams.get("nome") || "";
      const img = urlParams.get("img") || "";
      let currentLang =
        urlParams.get("lang") || localStorage.getItem("szb_lang") || "pt";

      if (!nome && !img) {
        window.location.href = "index.html";
      } else {
        document.title = nome || i18n[currentLang].page_title;
        document.querySelector('link[rel="canonical"]').href =
          "https://32c6c6-a9.myshopify.com/products/" +
          encodeURIComponent(nome || "produto");

        document.getElementById("prod-titulo").textContent = nome;

        if (img) {
          document.getElementById("prod-img").src = img;
          document.getElementById("prod-img").style.display = "block";
          document.getElementById("prod-placeholder").style.display = "none";
        }

        function setLang(lang) {
          currentLang = lang;
          localStorage.setItem("szb_lang", lang);
          document.documentElement.lang = i18n[lang].lang_attr;
          document
            .getElementById("btn-pt")
            .classList.toggle("active", lang === "pt");
          document
            .getElementById("btn-en")
            .classList.toggle("active", lang === "en");
          document.getElementById("btn-voltar").textContent =
            i18n[lang].btn_voltar;
          const p = new URLSearchParams(window.location.search);
          p.set("lang", lang);
          window.history.replaceState({}, "", "?" + p.toString());
        }

        setLang(currentLang);

        document.cookie =
          "SIZEBAY_SESSION_ID_V4=0651FC19655De443cc7be89c4306ba6c1a20f4f05df2; path=/; SameSite=Lax";

        window.SizebayTryOn = () => ({
          getTenantId: () => 6273,
          getEnvironment: () => "production",
          getDefaultUnit: () => "cm",
          getSizeSystem: () => "EU",
          getAnchor: () => ".product-image",
          getModules: () => ["selfTryon"],
          getLang: () => i18n[currentLang].sizebay_lang,
          getSelfTryonPermalink: () =>
            "https://32c6c6-a9.myshopify.com/products/" +
            document
              .querySelector('link[rel="canonical"]')
              .href.split("/products/")
              .pop(),
          getProductData: () => ({
            product_id: null,
            title: document.getElementById("prod-titulo").textContent,
            price: null,
            image_url: img,
          }),
          getBaseVrfUrl: () => "https://vfr-v3-production.sizebay.technology/",
          getSelfTryonBaseUrl: () =>
            "https://tryon-dev.internalsizebay.com/tryon/index.html",
          getSelfTryonBackendUrl: () =>
            "https://tryon-dev.internalsizebay.com/",
        });

        window.addEventListener("DOMContentLoaded", () => {
          if (document.getElementById("szb-tryon__implantation")) return;
          const script = document.createElement("script");
          script.id = "szb-tryon__implantation";
          script.src =
            "https://vfr-implantation.s3.us-east-1.amazonaws.com/new-implantation/szb-implantation.js";
          script.async = true;
          document.body.appendChild(script);
        });

        if (
          document.readyState === "interactive" ||
          document.readyState === "complete"
        ) {
          if (!document.getElementById("szb-tryon__implantation")) {
            const script = document.createElement("script");
            script.id = "szb-tryon__implantation";
            script.src =
              "https://vfr-implantation.s3.us-east-1.amazonaws.com/new-implantation/szb-implantation.js";
            script.async = true;
            document.body.appendChild(script);
          }
        }
      }
    </script>
  </body>
</html>
