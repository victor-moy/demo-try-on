<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produto</title>
    <link rel="canonical" href="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        min-height: 100vh;
      }

      nav {
        padding: 16px 24px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      nav img {
        height: 24px;
      }
      .btn-voltar {
        font-size: 12px;
        color: #999;
        text-decoration: none;
        font-family: "Inter", sans-serif;
        transition: color 0.2s;
      }
      .btn-voltar:hover {
        color: #1a1a1a;
      }

      .product {
        max-width: 480px;
        margin: 0 auto;
        background: #fff;
        animation: fadeUp 0.4s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .product-image {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        background: #ececec;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .product-image .placeholder {
        font-size: 72px;
        color: #ccc;
      }
      .tag-categoria {
        position: absolute;
        bottom: 16px;
        left: 16px;
        background: #fff;
        color: #1a1a1a;
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 6px 12px;
        font-weight: 500;
      }

      .product-info {
        padding: 28px 24px 48px;
      }
      .product-title {
        font-size: 26px;
        font-weight: 400;
        line-height: 1.2;
        margin-bottom: 14px;
        letter-spacing: -0.3px;
      }
      .divider {
        width: 32px;
        height: 2px;
        background: #1a1a1a;
        margin-bottom: 16px;
      }
      .product-description {
        font-size: 14px;
        line-height: 1.75;
        color: #666;
        font-weight: 300;
      }

      @media (min-width: 768px) {
        .product {
          max-width: 960px;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .product-image {
          aspect-ratio: auto;
          min-height: 580px;
        }
        .product-info {
          padding: 48px 44px;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .product-title {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <img
        src="https://sizebay.com/wp-content/uploads/2025/10/logo-sizebay-atualizado.svg"
        alt="Sizebay"
      />
      <a class="btn-voltar" href="index.html">← Voltar ao formulário</a>
    </nav>

    <main class="product">
      <div class="product-image">
        <div class="placeholder" id="prod-placeholder">👗</div>
        <img id="prod-img" src="" alt="" style="display: none" />
      </div>
      <div class="product-info">
        <h1 class="product-title" id="prod-titulo"></h1>
        <div class="divider"></div>
      </div>
    </main>

    <script>
      // Lê os dados salvos pelo formulário
      const raw = localStorage.getItem("szb_produto");

      if (!raw) {
        window.location.href = "index.html";
      } else {
        const { nome, img } = JSON.parse(raw);

        // Preenche a página
        document.title = nome || "Produto";
        document.querySelector('link[rel="canonical"]').href =
          "https://32c6c6-a9.myshopify.com/products/" +
          encodeURIComponent(nome || "produto");

        document.getElementById("prod-titulo").textContent = nome;

        if (img) {
          document.getElementById("prod-img").src = img;
          document.getElementById("prod-img").style.display = "block";
          document.getElementById("prod-placeholder").style.display = "none";
        }

        // Cookie e script Sizebay
        document.cookie =
          "SIZEBAY_SESSION_ID_V4=0651FC19655De443cc7be89c4306ba6c1a20f4f05df2; path=/; SameSite=Lax";

        const collectProductData = () => {
          return {
            product_id: null,
            title: document.querySelector(".product-title").textContent,
            price: null,
            image_url: document.querySelector(".product-image img").src,
          };
        };

        window.SizebayTryOn = () => ({
          getTenantId: () => 6273,
          getEnvironment: () => "production",
          getDefaultUnit: () => "cm",
          getSizeSystem: () => "EU",
          getAnchor: () => ".product-image",
          getModules: () => ["selfTryon"],
          getLang: "br",
          getSelfTryonPermalink: () =>
            "https://32c6c6-a9.myshopify.com/products/" +
            document
              .querySelector('link[rel="canonical"]')
              .href.split("/products/")
              .pop(),
          getProductData: collectProductData,
          getBaseVrfUrl: () => "https://vfr-v3-production.sizebay.technology/",
          getSelfTryonBaseUrl: () =>
            "https://tryon-dev.internalsizebay.com/tryon/index.html",
          getSelfTryonBackendUrl: () =>
            "https://tryon-dev.internalsizebay.com/",
        });

        const script = document.createElement("script");
        script.src = `https://vfr-implantation.s3.us-east-1.amazonaws.com/new-implantation/szb-implantation.js`;
        script.async = true;
        script.id = "szb-tryon__implantation";
        if (!document.getElementById(script.id))
          document.body.appendChild(script);
      }
    </script>
  </body>
</html>
